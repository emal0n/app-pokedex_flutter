name: iOS Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS Release
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Create iOS Archive
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $PWD/build/Runner.xcarchive \
            clean archive CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-build
          path: ios/build/Runner.xcarchive
          retention-days: 30

  # Note: For actual App Store deployment, you'll need to configure
  # code signing certificates and provisioning profiles
  # This workflow creates an unsigned build for testing purposes

