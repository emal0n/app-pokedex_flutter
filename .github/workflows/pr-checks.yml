name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: |
          if ! dart format --output=none --set-exit-if-changed . ; then
            echo "❌ Code formatting issues detected. Please run 'dart format .' to fix."
            exit 1
          fi

      - name: Analyze code
        run: |
          if ! flutter analyze ; then
            echo "❌ Code analysis found issues. Please fix them before merging."
            exit 1
          fi

      - name: Run tests
        run: |
          if ! flutter test ; then
            echo "❌ Tests failed. Please fix failing tests before merging."
            exit 1
          fi

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} **PR Validation ${status === 'success' ? 'Passed' : 'Failed'}**
            
            - Formatting: ${{ steps.verify-formatting.outcome || 'N/A' }}
            - Analysis: ${{ steps.analyze-code.outcome || 'N/A' }}
            - Tests: ${{ steps.run-tests.outcome || 'N/A' }}
            - Build: ${{ steps.build-android-apk.outcome || 'N/A' }}
            
            Commit: ${{ github.sha }}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  size-check:
    name: App Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Get APK size
        id: apk-size
        run: |
          SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "APK Size: $SIZE"

      - name: Comment APK size
        uses: actions/github-script@v7
        with:
          script: |
            const size = '${{ steps.apk-size.outputs.size }}';
            const message = `📦 **Build Size Report**
            
            Release APK Size: **${size}**
            
            _This is the size of the release APK for this PR._`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

